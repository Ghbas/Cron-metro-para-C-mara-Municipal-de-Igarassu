<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro Oficial - Câmara de Igarassu</title>
    <style>
        :root {
            --primary: #02baf2;
            --warning: #ffc107;
            --danger: #f84545;
            --success: #28a745;
            --purple: #8b5cf6;
            --extra: #06b6d4;
            --white: #fff;
            --light: #f1f5f9;
            --dark: #0f172a;
            --gray: #64748b;
            --font-mono: 'Roboto Mono', SFMono-Regular, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ESTILOS DO RELÓGIO REDONDO */
        .round-timer-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-ring-bg { fill: none; stroke: rgba(0, 0, 0, 0.05); }
        #view-display .progress-ring-bg { stroke: rgba(255, 255, 255, 0.1); }

        .progress-ring-bar {
            fill: none;
            stroke: var(--primary);
            stroke-linecap: round;
            stroke-dasharray: 100;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.5s linear, stroke 0.3s ease;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .time-warning { stroke: var(--warning) !important; color: var(--warning) !important; }
        .time-danger { stroke: var(--danger) !important; color: var(--danger) !important; animation: pulse 1s infinite alternate; }

        @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }

        /* PAINEL DE CONTROLE */
        #view-controller { padding: 20px; display: none; overflow-y: auto; height: 100vh; }
        .ctrl-card { max-width: 1200px; margin: 0 auto; background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .ctrl-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid var(--light); padding-bottom: 15px; }
        
        .logo-cmi-ctrl { max-height: 60px; width: auto; object-fit: contain; }

        .preview-section { background: var(--dark); border-radius: 15px; padding: 25px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .preview-clock-box { text-align: center; }
        .preview-clock-label { font-size: 9px; text-transform: uppercase; color: var(--gray); margin-bottom: 10px; letter-spacing: 1px;}
        
        .size-ctrl-preview { width: 100px; height: 100px; }
        .digital-ctrl { font-family: var(--font-mono); font-size: 1.5rem; font-weight: bold; position: absolute; color: white; }
        
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-group-box { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .btn-group-box h3 { font-size: 11px; margin-bottom: 10px; text-transform: uppercase; color: var(--gray); text-align: center; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        
        button { padding: 10px 2px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; font-size: 11px; }
        button:hover { filter: brightness(85%); transform: translateY(-1px); }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); color: #000; }
        .btn-danger { background: var(--danger); }
        .btn-primary { background: var(--primary); }
        .btn-purple { background: var(--purple); }
        .btn-extra { background: var(--extra); }

        /* TELÃO */
        #view-display { background: #020617; color: white; height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .display-header-container { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 40px; width: 100%; }
        .logo-cmi-display { max-height: 18vh; width: auto; object-fit: contain; }
        .display-text-group { text-align: left; }
        .display-text-group h1 { font-size: 3.5vw; color: var(--primary); text-transform: uppercase; line-height: 1.1; }
        .display-text-group h2 { font-size: 1.8vw; color: var(--gray); font-weight: 400; letter-spacing: 2px; margin-top: 5px; }
        
        .clock-wrapper { transition: opacity 0.4s ease; text-align: center; }
        .hidden { display: none !important; }
        
        .size-main-display { width: 65vh; height: 65vh; }
        .digital-display { font-family: var(--font-mono); font-size: 12vh; font-weight: bold; position: absolute; }
        .label-mode { font-size: 4vh; font-weight: bold; margin-bottom: 15px; letter-spacing: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <audio id="audio" src="audio.mp3" preload="auto"></audio>

    <div id="view-controller">
        <div class="ctrl-card">
            <div class="ctrl-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <img src="logo.png" alt="" class="logo-cmi-ctrl" onerror="this.style.display='none'">
                    <h1 style="font-size: 18px; color: var(--primary)">Painel Multicontrolador Legislativo</h1>
                </div>
                <button class="btn-primary" onclick="abrirTelao()" style="padding: 10px 20px; font-size: 14px;">🖥️ Abrir Telão</button>
            </div>

            <div class="preview-section">
                <div class="preview-clock-box">
                    <div class="preview-clock-label">TRIBUNA</div>
                    <div class="round-timer-container size-ctrl-preview">
                        <svg viewBox="0 0 36 36" width="100%"><path class="progress-ring-bg" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="2"/><path id="ring-main-ctrl" class="progress-ring-bar" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="2"/></svg>
                        <div id="txt-main-ctrl" class="digital-ctrl">10:00</div>
                    </div>
                </div>
                <div class="preview-clock-box">
                    <div class="preview-clock-label">APARTE</div>
                    <div class="round-timer-container size-ctrl-preview">
                        <svg viewBox="0 0 36 36" width="100%"><path class="progress-ring-bg" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="2"/><path id="ring-aparte-ctrl" class="progress-ring-bar" style="stroke:var(--warning)" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="2"/></svg>
                        <div id="txt-aparte-ctrl" class="digital-ctrl" style="color:var(--warning)">03:00</div>
                    </div>
                </div>
                <div class="preview-clock-box">
                    <div class="preview-clock-label">CONSIDERAÇÕES</div>
                    <div class="round-timer-container size-ctrl-preview">
                        <svg viewBox="0 0 36 36" width="100%"><path class="progress-ring-bg" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="2"/><path id="ring-consid-ctrl" class="progress-ring-bar" style="stroke:var(--purple)" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="2"/></svg>
                        <div id="txt-consid-ctrl" class="digital-ctrl" style="color:var(--purple)">02:00</div>
                    </div>
                </div>
                <div class="preview-clock-box">
                    <div class="preview-clock-label">TEMPO EXTRA</div>
                    <div class="round-timer-container size-ctrl-preview">
                        <svg viewBox="0 0 36 36" width="100%"><path class="progress-ring-bg" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="2"/><path id="ring-extra-ctrl" class="progress-ring-bar" style="stroke:var(--extra)" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="2"/></svg>
                        <div id="txt-extra-ctrl" class="digital-ctrl" style="color:var(--extra)">00:00</div>
                    </div>
                </div>
            </div>

            <div class="controls-grid">
                <div class="btn-group-box">
                    <h3>Tribuna Principal</h3>
                    <div class="btn-grid">
                        <button class="btn-success" onclick="controlTimer('main', 'start')">Iniciar</button>
                        <button class="btn-warning" onclick="controlTimer('main', 'pause')">Pausar</button>
                        <button class="btn-danger" onclick="controlTimer('main', 'reset')">Zerar</button>
                        <button class="btn-primary" onclick="addTime('main', 60)">+1m</button>
                        <button class="btn-primary" onclick="addTime('main', 180)">+3m</button>
                        <button class="btn-dark" onclick="tocarSinal()">🔔 Som</button>
                    </div>
                </div>
                <div class="btn-group-box" style="border-color: var(--warning)">
                    <h3 style="color:#b45309">Aparte</h3>
                    <div class="btn-grid">
                        <button class="btn-success" onclick="controlTimer('aparte', 'start')">Iniciar</button>
                        <button class="btn-warning" onclick="controlTimer('aparte', 'pause')">Pausar</button>
                        <button class="btn-danger" onclick="controlTimer('aparte', 'reset')">Zerar</button>
                        <button class="btn-primary" onclick="addTime('aparte', 60)">+1m</button>
                        <button class="btn-primary" onclick="addTime('aparte', 180)">+3m</button>
                    </div>
                </div>
                <div class="btn-group-box" style="border-color: var(--purple)">
                    <h3 style="color:var(--purple)">Considerações Finais</h3>
                    <div class="btn-grid">
                        <button class="btn-purple" onclick="controlTimer('consid', 'start')">Iniciar</button>
                        <button class="btn-warning" onclick="controlTimer('consid', 'pause')">Pausar</button>
                        <button class="btn-danger" onclick="controlTimer('consid', 'reset')">Zerar</button>
                        <button class="btn-primary" onclick="addTime('consid', 60)">+1m</button>
                        <button class="btn-primary" onclick="addTime('consid', 180)">+3m</button>
                    </div>
                </div>
                <div class="btn-group-box" style="border-color: var(--extra)">
                    <h3 style="color:var(--extra)">Tempo Extra</h3>
                    <div class="btn-grid">
                        <button class="btn-extra" onclick="controlTimer('extra', 'start')">Iniciar</button>
                        <button class="btn-warning" onclick="controlTimer('extra', 'pause')">Pausar</button>
                        <button class="btn-danger" onclick="controlTimer('extra', 'reset')">Zerar</button>
                        <button class="btn-primary" onclick="addTime('extra', 60)">+1m</button>
                        <button class="btn-primary" onclick="addTime('extra', 120)">+2m</button>
                        <button class="btn-primary" onclick="addTime('extra', 180)">+3m</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="view-display">
        <div class="display-header-container">
            <img src="logo.png" alt="" class="logo-cmi-display" onerror="this.style.display='none'">
            <div class="display-text-group">
                <h1>Câmara Municipal de Igarassu</h1>
                <h2 id="display-subtitle">Sessão Legislativa</h2>
            </div>
        </div>

        <div id="disp-wrapper-main" class="clock-wrapper">
            <div class="round-timer-container size-main-display">
                <svg viewBox="0 0 36 36" width="100%"><path class="progress-ring-bg" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="1.2"/><path id="ring-main-disp" class="progress-ring-bar" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="1.2"/></svg>
                <div id="txt-main-disp" class="digital-display">10:00</div>
            </div>
        </div>

        <div id="disp-wrapper-aparte" class="clock-wrapper hidden">
            <div class="label-mode" style="color:var(--warning)">MODO APARTE</div>
            <div class="round-timer-container size-main-display">
                <svg viewBox="0 0 36 36" width="100%"><path class="progress-ring-bg" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="1.2"/><path id="ring-aparte-disp" class="progress-ring-bar" style="stroke:var(--warning)" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="1.2"/></svg>
                <div id="txt-aparte-disp" class="digital-display" style="color:var(--warning)">03:00</div>
            </div>
        </div>

        <div id="disp-wrapper-consid" class="clock-wrapper hidden">
            <div class="label-mode" style="color:var(--purple)">CONSIDERAÇÕES FINAIS</div>
            <div class="round-timer-container size-main-display">
                <svg viewBox="0 0 36 36" width="100%"><path class="progress-ring-bg" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="1.2"/><path id="ring-consid-disp" class="progress-ring-bar" style="stroke:var(--purple)" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="1.2"/></svg>
                <div id="txt-consid-disp" class="digital-display" style="color:var(--purple)">02:00</div>
            </div>
        </div>

        <div id="disp-wrapper-extra" class="clock-wrapper hidden">
            <div class="label-mode" style="color:var(--extra)">TEMPO EXTRA</div>
            <div class="round-timer-container size-main-display">
                <svg viewBox="0 0 36 36" width="100%"><path class="progress-ring-bg" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="1.2"/><path id="ring-extra-disp" class="progress-ring-bar" style="stroke:var(--extra)" d="M18 2 a 16 16 0 0 1 0 32 a 16 16 0 0 1 0 -32" stroke-width="1.2"/></svg>
                <div id="txt-extra-disp" class="digital-display" style="color:var(--extra)">00:00</div>
            </div>
        </div>
    </div>

    <script>
        const canal = new BroadcastChannel('igarassu_v12');
        const params = new URLSearchParams(window.location.search);
        const isDisplay = params.get('mode') === 'display';

        // O Extra agora começa com 0 segundos.
        const DEFAULTS = { main: 600, aparte: 180, consid: 120, extra: 0 };
        let timers = { 
            main: { cur: DEFAULTS.main, init: DEFAULTS.main, int: null },
            aparte: { cur: DEFAULTS.aparte, init: DEFAULTS.aparte, int: null },
            consid: { cur: DEFAULTS.consid, init: DEFAULTS.consid, int: null },
            extra: { cur: DEFAULTS.extra, init: DEFAULTS.extra, int: null }
        };
        let activeMode = 'main';

        const audioEl = document.getElementById('audio');
        function tocarSinal() { audioEl.currentTime = 0; audioEl.play().catch(e => {}); }

        if (isDisplay) {
            document.getElementById('view-display').style.display = 'flex';
            canal.onmessage = e => syncUI(e.data);
        } else {
            document.getElementById('view-controller').style.display = 'block';
            broadcast();
        }

        function format(s) {
            let m = Math.floor(Math.max(0, s) / 60);
            let sec = Math.max(0, s) % 60;
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function syncUI(data) {
            if (data.playBeep) tocarSinal();
            activeMode = data.activeMode;
            
            Object.keys(timers).forEach(m => {
                const info = data.timers[m];
                const ringId = isDisplay ? `ring-${m}-disp` : `ring-${m}-ctrl`;
                const txtId = isDisplay ? `txt-${m}-disp` : `txt-${m}-ctrl`;
                
                document.getElementById(txtId).textContent = format(info.cur);
                
                // Proteção matemática: Se o tempo inicial for 0 (como no Extra), o círculo fica vazio (100% offset)
                const percent = info.init > 0 ? (info.cur / info.init * 100) : 0;
                const offset = 100 - percent;
                document.getElementById(ringId).style.strokeDashoffset = offset;

                const txtEl = document.getElementById(txtId);
                const ringEl = document.getElementById(ringId);
                [txtEl, ringEl].forEach(el => {
                    el.classList.remove('time-warning', 'time-danger');
                    // Só fica vermelho se o relógio já teve tempo e chegou a 0, evitando que o Extra inicie vermelho
                    if(info.cur <= 0 && info.init > 0) el.classList.add('time-danger');
                    else if(m === 'main' && info.cur <= 60 && info.cur > 0) el.classList.add('time-warning');
                });

                if(isDisplay) {
                    document.getElementById(`disp-wrapper-${m}`).classList.toggle('hidden', activeMode !== m);
                }
            });
        }

        function broadcast(playBeep = false) {
            const data = { timers: {}, activeMode, playBeep };
            Object.keys(timers).forEach(m => {
                data.timers[m] = { cur: timers[m].cur, init: timers[m].init };
            });
            syncUI(data);
            if(!isDisplay) canal.postMessage(data);
        }

        function controlTimer(mode, action) {
            if(action === 'start') {
                Object.keys(timers).forEach(m => { clearInterval(timers[m].int); timers[m].int = null; });
                activeMode = mode;
                
                if(timers[mode].cur > 0) {
                    timers[mode].int = setInterval(() => {
                        timers[mode].cur--;
                        if(timers[mode].cur <= 0) {
                            clearInterval(timers[mode].int); 
                            timers[mode].int = null;
                            timers[mode].cur = 0; // Trava no zero exato
                            broadcast(true); // O 'true' garante que a campainha vai tocar
                        } else { 
                            broadcast(); 
                        }
                    }, 1000);
                }
            } else if(action === 'pause') {
                clearInterval(timers[mode].int); timers[mode].int = null;
            } else if(action === 'reset') {
                clearInterval(timers[mode].int); timers[mode].int = null;
                timers[mode].cur = DEFAULTS[mode];
                timers[mode].init = DEFAULTS[mode];
                activeMode = 'main';
            }
            broadcast();
        }

        function addTime(mode, s) {
            // Se o relógio estava zerado, o tempo que adicionamos se torna a nova base de 100% do círculo
            if (timers[mode].cur <= 0) {
                timers[mode].init = s;
                timers[mode].cur = s;
            } else {
                timers[mode].cur += s;
                timers[mode].init = Math.max(timers[mode].init, timers[mode].cur);
            }
            broadcast();
        }

        function abrirTelao() { window.open(window.location.href + '?mode=display', '_blank'); }
    </script>
</body>
</html>
